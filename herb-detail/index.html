<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... | herbcraft.app</title>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var herb = params.get('herb');
        if (herb) {
            window.location.replace('../herbs/' + encodeURIComponent(herb));
        } else {
            window.location.replace('../herb-directory/');
        }
    })();
    </script>
    <meta http-equiv="refresh" content="0;url=../herb-directory/">
</head>
<body>
    <p>Redirecting... If you are not redirected, <a href="../herb-directory/">click here</a>.</p>
</body>
</html>
